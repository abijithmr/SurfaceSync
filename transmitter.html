<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurfaceSync | Transmitter</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Custom Config for Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        glass: '#F2F2F7',
                        surface: '#FFFFFF',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'pulse-fast': 'pulse 0.8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <style>
        /* Base Styles */
        body {
            background-color: #F2F2F7;
            color: #1d1d1f;
            overflow-x: hidden;
            user-select: none;
        }

        ::selection {
            background-color: #BFDBFE; /* blue-200 */
            color: #1e3a8a;
        }

        /* Liquid Glass Background Spheres (Matches Receiver Exactly) */
        .ambient-light {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s ease-in-out infinite;
        }

        .light-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: rgba(96, 165, 250, 0.4); }
        .light-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: rgba(216, 180, 254, 0.3); }
        .light-3 { top: 40%; left: 30%; width: 40vw; height: 40vw; background: rgba(209, 250, 229, 0.4); animation-delay: -5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(45px);
            -webkit-backdrop-filter: blur(45px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.1);
            border-radius: 20px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <!-- Ambient Background -->
    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>
    <div class="ambient-light light-3"></div>

    <!-- Main Dashboard Grid -->
    <main class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-6">

        <!-- Header / Status (Full Width Top) -->
        <header class="lg:col-span-12 glass-card rounded-3xl p-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <!-- Status Light - Matches Receiver Logic -->
                <div id="statusLight" class="w-3 h-3 rounded-full bg-gray-400 shadow-[0_0_15px_rgba(156,163,175,0.6)]"></div>
                <h1 class="text-2xl font-semibold tracking-tight text-gray-800">SurfaceSync <span class="text-gray-400 font-light">| Transmitter</span></h1>
            </div>
            <div class="flex items-center gap-3 px-4 py-2 bg-white/40 rounded-full border border-white/50">
                <span id="systemStatus" class="text-sm font-medium text-gray-600">System: Idle</span>
            </div>
        </header>

        <!-- Left Column: Controls & Input -->
        <section class="lg:col-span-5 flex flex-col gap-6">
            
            <!-- Message Input Card -->
            <div class="glass-card rounded-3xl p-6 flex flex-col gap-4">
                <div class="flex items-center gap-2 mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                    </svg>
                    <h3 class="text-lg font-semibold text-gray-800">Compose Message</h3>
                </div>

                <textarea id="msgInput" rows="4" placeholder="Enter secure message to transmit..." 
                    class="w-full rounded-xl border border-white/50 bg-white/40 p-4 text-sm outline-none placeholder:text-gray-400 focus:bg-white/70 focus:ring-2 focus:ring-blue-500/20 transition-all shadow-sm resize-none custom-scroll"></textarea>

                <div class="relative">
                    <input type="file" id="fileInput" class="hidden" onchange="handleFileSelect()">
                    <label for="fileInput" class="flex w-full cursor-pointer items-center justify-center rounded-xl border border-dashed border-gray-300 bg-white/20 py-3 text-xs font-medium text-gray-500 hover:bg-white/40 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                        </svg>
                        <span id="fileName">Attach File (Optional)</span>
                    </label>
                </div>

                <button onclick="startTransmission()" id="sendBtn" class="w-full rounded-2xl bg-gradient-to-b from-[#007AFF] to-[#0062CC] py-4 text-[15px] font-semibold text-white shadow-[0_10px_20px_-5px_rgba(0,122,255,0.4)] transition-all hover:shadow-[0_15px_25px_-5px_rgba(0,122,255,0.5)] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
                    Start Encrypted Transfer
                </button>
            </div>

            <!-- System Stats -->
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card rounded-2xl p-5">
                    <p class="text-xs text-gray-500 font-medium mb-1">Encryption</p>
                    <div class="flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                        </svg>
                        <span class="text-sm font-semibold text-gray-800">AES-256</span>
                    </div>
                </div>
                <div class="glass-card rounded-2xl p-5">
                    <p class="text-xs text-gray-500 font-medium mb-1">Modulation</p>
                    <div class="flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                        </svg>
                        <span class="text-sm font-semibold text-gray-800">OFDM</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right Column: Visualization & Logs -->
        <section class="lg:col-span-7 flex flex-col gap-6">
            
            <!-- Transmission Visualizer -->
            <div class="glass-card rounded-3xl p-1 overflow-hidden relative h-64 bg-black/5">
                <div class="absolute top-4 left-4 z-10">
                    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Acoustic Output</p>
                </div>
                <canvas id="visualizerCanvas" class="w-full h-full rounded-2xl"></canvas>
                
                <!-- Overlay Text when idle -->
                <div id="vizPlaceholder" class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <p class="text-sm text-gray-400 font-medium">Waiting for transmission...</p>
                </div>
            </div>

            <!-- Log Window -->
            <div class="glass-card rounded-2xl p-4 h-48 flex flex-col">
                <div class="flex justify-between items-center mb-2 border-b border-gray-200/50 pb-2">
                    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Transmission Log</p>
                    <button onclick="clearLogs()" class="text-xs text-blue-500 hover:text-blue-600 cursor-pointer">Clear</button>
                </div>
                <div id="logWindow" class="custom-scroll flex-grow overflow-y-auto font-mono text-xs space-y-1 text-gray-600">
                    <div class="log-entry"><span class="text-gray-400">[SYS]</span> System ready. Enter message to begin.</div>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="glass-card rounded-2xl p-6">
                <div class="flex justify-between text-xs font-medium text-gray-500 mb-2">
                    <span>Transfer Progress</span>
                    <span id="progressText">0%</span>
                </div>
                <div class="w-full bg-gray-200/50 rounded-full h-2 overflow-hidden">
                    <div id="progressBar" class="bg-blue-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

        </section>

    </main>

    <!-- Logic Script -->
    <script>
        // --- State ---
        let isTransmitting = false;
        let animationFrameId;
        let audioContext;
        let analyser;
        let dataArray;
        
        // DOM Elements
        const statusLight = document.getElementById('statusLight');
        const systemStatus = document.getElementById('systemStatus');
        const logWindow = document.getElementById('logWindow');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const sendBtn = document.getElementById('sendBtn');
        const fileName = document.getElementById('fileName');
        const vizPlaceholder = document.getElementById('vizPlaceholder');
        const canvas = document.getElementById('visualizerCanvas');
        const canvasCtx = canvas.getContext('2d');

        // --- Initialization ---
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- Logging System ---
        function addLog(message, type = 'INFO') {
            const div = document.createElement('div');
            div.className = 'log-entry flex gap-2';
            const timestamp = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' }) + '.' + Math.floor(Math.random()*999);
            
            let colorClass = 'text-gray-400';
            if(type === 'SUCCESS') colorClass = 'text-green-600';
            if(type === 'DATA') colorClass = 'text-blue-600';
            if(type === 'ERROR') colorClass = 'text-red-500';

            div.innerHTML = `<span class="${colorClass}">[${timestamp}]</span> <span>${message}</span>`;
            logWindow.appendChild(div);
            logWindow.scrollTop = logWindow.scrollHeight;
        }

        function clearLogs() {
            logWindow.innerHTML = '';
            addLog('Log cleared by user.');
        }

        // --- Status Light Management (Matches Receiver) ---
        function updateStatusLight(transmitting) {
            if (transmitting) {
                // Blinking green when transmitting
                statusLight.className = 'w-3 h-3 rounded-full bg-green-500 shadow-[0_0_15px_rgba(34,197,94,0.6)] animate-pulse-fast';
                systemStatus.textContent = 'System: Transmitting...';
                systemStatus.className = 'text-sm font-medium text-green-600';
            } else {
                // Solid gray when idle
                statusLight.className = 'w-3 h-3 rounded-full bg-gray-400 shadow-[0_0_15px_rgba(156,163,175,0.6)]';
                systemStatus.textContent = 'System: Idle';
                systemStatus.className = 'text-sm font-medium text-gray-600';
            }
        }

        // --- File Handling ---
        function handleFileSelect() {
            const input = document.getElementById('fileInput');
            if (input.files && input.files[0]) {
                fileName.textContent = input.files[0].name;
                fileName.classList.add('text-blue-600', 'font-medium');
                addLog(`File selected: ${input.files[0].name}`, 'DATA');
            }
        }

        // --- Core Transmission Logic (Simulated) ---
        async function startTransmission() {
            const msg = document.getElementById('msgInput').value;
            const fileInput = document.getElementById('fileInput');

            if (!msg && !fileInput.files[0]) {
                alert("Please enter a message or select a file.");
                return;
            }

            if (isTransmitting) return;
            isTransmitting = true;

            // UI Updates
            sendBtn.disabled = true;
            sendBtn.textContent = "Transmitting...";
            vizPlaceholder.style.display = 'none';
            updateStatusLight(true); // Start blinking green
            
            addLog('Initializing acoustic link...', 'INFO');
            await sleep(800);
            
            addLog('Encrypting payload (AES-256)...', 'DATA');
            await sleep(1000);

            addLog('Modulating signal (OFDM)...', 'DATA');
            await sleep(800);

            addLog('Transmission started. Playing acoustic signal...', 'SUCCESS');
            
            // Start Visualizer Animation
            initVisualizer();

            // Simulate Progress
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 5;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    finishTransmission();
                }
                
                progressBar.style.width = `${progress}%`;
                progressText.textContent = `${Math.floor(progress)}%`;
                
                // Log occasionally
                if (Math.floor(progress) % 20 === 0 && progress > 0 && progress < 100) {
                    addLog(`Packet ${Math.floor(progress/10)} sent. Acknowledged.`, 'DATA');
                }
            }, 200);
        }

        function finishTransmission() {
            isTransmitting = false;
            updateStatusLight(false); // Stop blinking
            sendBtn.disabled = false;
            sendBtn.textContent = "Start Encrypted Transfer";
            
            addLog('Transmission complete. Link closed.', 'SUCCESS');
            
            setTimeout(() => {
                progressBar.style.width = '0%';
                progressText.textContent = '0%';
                vizPlaceholder.style.display = 'flex';
                cancelAnimationFrame(animationFrameId);
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
            }, 2000);
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // --- Visualizer Animation (Simulated Acoustic Waves) ---
        function initVisualizer() {
            let time = 0;
            
            function draw() {
                if (!isTransmitting) return;
                
                animationFrameId = requestAnimationFrame(draw);
                time += 0.1;

                canvasCtx.fillStyle = 'rgba(242, 242, 247, 0.2)'; // Fade effect
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                canvasCtx.lineWidth = 2;
                canvasCtx.strokeStyle = '#3B82F6'; // Blue-500
                canvasCtx.beginPath();

                const sliceWidth = canvas.width * 1.0 / 100;
                let x = 0;

                for (let i = 0; i < 100; i++) {
                    // Create complex wave pattern
                    const y = (canvas.height / 2) + 
                              (Math.sin(i * 0.2 + time) * 30) + 
                              (Math.sin(i * 0.5 - time * 2) * 15) +
                              (Math.random() * 5); // Add noise

                    if (i === 0) {
                        canvasCtx.moveTo(x, y);
                    } else {
                        canvasCtx.lineTo(x, y);
                    }

                    x += sliceWidth;
                }

                canvasCtx.stroke();
            }
            
            draw();
        }

    </script>
</body>
</html>
